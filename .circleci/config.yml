# Javascript Node CircleCI 2.1 configuration file
#
# Check https://circleci.com/docs/language-javascript/ for more details
#
version: 2.1

defaults: &defaults
  working_directory: ~/repo
  docker:
    - image: cimg/node:lts
      auth:
        username: $DOCKER_USER
        password: $DOCKER_PASS

jobs:
  shellcheck:
    docker:
      - image: koalaman/shellcheck-alpine:stable
    steps:
      - checkout
      - run:
          name: Run shellcheck
          command: |
            find . -type f -name "*.sh" -exec shellcheck --exclude=SC2154,SC1091,SC2034,SC2096,SC2038 {} +

  test:
    <<: *defaults
    steps:
      - checkout
      - setup_remote_docker:
          version: default
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package.json" }}
            - v1-dependencies-
      - run:
          name: Install dependencies
          command: |
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
            npm cache clean --force
      - run:
          name: Run tests
          command: |
            if [[ $EUID == 0 ]]; then
              export SUDO=""
            else
              export SUDO="sudo"
            fi
            set -e
            git config --global user.email "b23prodtm@users.sourceforge.net"
            git config --global user.name "B R T"
             npm test
      - run:
          name: Build
          command: npm run build --if-present
      - save_cache:
          paths:
            - node_modules
          key: v1-dependencies-{{ checksum "package.json" }}

      - persist_to_workspace:
          root: ~/repo
          paths:
            - .

  deploy:
    <<: *defaults
    steps:
      - attach_workspace:
          at: ~/repo
      - run:
          name: Plan deployment
          command: |
            circleci run release plan "${CIRCLE_JOB}" \
              --environment-name="default" \
              --component-name="${CIRCLE_PROJECT_REPONAME}" \
              --target-version="1.0.${CIRCLE_BUILD_NUM}-${CIRCLE_SHA1:0:7}"
      - run:
          name: Publish package
          command: |
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            npm publish --access public
      - run:
          name: Update deployment status to running
          command: circleci run release update "${CIRCLE_JOB}" --status=RUNNING
      - run:
          name: Update deployment status to success
          command: circleci run release update "${CIRCLE_JOB}" --status=SUCCESS
          when: on_success
      - run:
          name: Update deployment status to failed
          command: circleci run release update "${CIRCLE_JOB}" --status=FAILED
          when: on_fail

workflows:
  version: 2
  test-deploy:
    jobs:
      - shellcheck
      - test:
          requires:
            - shellcheck
      - deploy:
          context:
            - Info-b23prodtm
            - trusted-publishing-guard
          requires:
            - test
          filters:
            branches:
              only: master
            tags:
              only: /v(\.?[0-9]+)*/